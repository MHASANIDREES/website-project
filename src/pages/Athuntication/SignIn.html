<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign In - UOL Inventory</title>

<!-- Favicon -->
<link rel="icon" href="../../../assets/logo.png">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = { darkMode: 'class' }
</script>

</head>

<body class="bg-purple-600 dark:bg-gray-900 text-white min-h-screen flex flex-col transition duration-300">

<!-- NAVBAR -->
<nav class="flex justify-between items-center bg-white dark:bg-gray-800 p-4 rounded-lg m-4 shadow-lg text-black dark:text-white">

    <h1 class="font-bold text-purple-700 dark:text-white">
        UOL Inventory
    </h1>

    <div class="space-x-4 text-sm font-semibold">
        <a href="../../../index.html" class="hover:text-purple-600">Home</a>
        <a href="../About/About.html" class="hover:text-purple-600">About</a>
        <a href="../Contact/Contact.html" class="hover:text-purple-600">Contact</a>
        <a href="./SignIn.html" class="hover:text-purple-600">Sign In</a>
        <a href="./SignUp.html" class="hover:text-purple-600">Sign Up</a>
    </div>

    <!-- TOGGLE BUTTON -->
    <button onclick="toggleTheme()" 
        class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition">
        🌙 Toggle
    </button>

</nav>

<!-- MAIN CONTENT -->
<div class="flex-grow flex justify-center items-center">

    <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-xl w-96 text-center">

        <h2 class="text-2xl font-bold mb-4 text-black dark:text-white">
            Sign In
        </h2>

        <input type="email" placeholder="Email"
            class="w-full p-2 mb-3 border rounded text-black">

        <input type="password" placeholder="Password"
            class="w-full p-2 mb-3 border rounded text-black">

        <button class="bg-purple-600 text-white w-full py-2 rounded hover:bg-purple-700 transition">
            Login
        </button>

        <p class="mt-3 text-sm text-gray-600 dark:text-gray-300">
            Don't have an account?
            <a href="./SignUp.html" class="text-purple-600">Sign Up</a>
        </p>

    </div>

</div>

<!-- FOOTER -->
<footer class="text-center text-sm py-4">
    © 2026 UOL Inventory System | All Rights Reserved
</footer>

<!-- THEME SCRIPT -->
<script type="module">
import { toggleTheme, loadTheme } from "../../../src/constants/themeConstants.js";

window.toggleTheme = toggleTheme;
loadTheme();
</script>

</body>
</html>
